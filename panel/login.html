<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xabor — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
<style>
:root {
  --color-bg: #F8F9FA;
  --color-surface: #FFFFFF;
  --color-surface-2: #F1F3F5;
  --color-border: #E9ECEF;
  --color-border-strong: #DEE2E6;
  --color-text-primary: #1A1D23;
  --color-text-secondary: #6B7280;
  --color-text-muted: #9CA3AF;
  --color-brand: #FF6B35;
  --color-brand-light: #FFF4EF;
  --color-success: #10B981;
  --color-danger: #EF4444;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.08), 0 4px 6px rgba(0,0,0,0.03);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--color-bg);
  color: var(--color-text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  padding: 20px;
}
.login-box {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-lg);
}
.logo {
  text-align: center;
  margin-bottom: 28px;
}
.logo h1 {
  font-size: 1.9rem;
  font-weight: 800;
  letter-spacing: 0.5px;
  color: var(--color-text-primary);
}
.logo p {
  color: var(--color-text-secondary);
  font-size: 0.85rem;
  margin-top: 4px;
}
label {
  display: block;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--color-text-secondary);
  margin-bottom: 7px;
}
input[type="password"] {
  width: 100%;
  background: var(--color-surface);
  border: 1px solid var(--color-border-strong);
  border-radius: var(--radius-md);
  color: var(--color-text-primary);
  padding: 12px 14px;
  font-size: 1rem;
  font-family: inherit;
  outline: none;
  transition: all .15s;
}
input[type="password"]:focus { border-color: var(--color-brand); box-shadow: 0 0 0 3px var(--color-brand-light); }
button {
  width: 100%;
  background: var(--color-brand);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  padding: 13px;
  font-size: 1rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  margin-top: 20px;
  transition: background .2s;
}
button:hover { background: #E85826; }
button:disabled { background: var(--color-border-strong); color: var(--color-text-muted); cursor: default; }
#error {
  color: var(--color-danger);
  font-size: 0.83rem;
  text-align: center;
  margin-top: 12px;
  min-height: 18px;
}
/* Modal fondo de caja */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,29,35,0.5);
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.modal-overlay.visible { display: flex; }
.modal-box {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: 36px 32px;
  width: 100%;
  max-width: 360px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.modal-box h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; color: var(--color-text-primary); }
.modal-box p  { font-size: 0.85rem; color: var(--color-text-secondary); margin-bottom: 20px; }
.fondo-input {
  width: 100%;
  background: var(--color-surface);
  border: 1px solid var(--color-border-strong);
  border-radius: var(--radius-md);
  color: var(--color-text-primary);
  padding: 14px;
  font-size: 1.4rem;
  font-weight: 700;
  font-family: inherit;
  text-align: center;
  outline: none;
  transition: all .15s;
}
.fondo-input:focus { border-color: var(--color-brand); box-shadow: 0 0 0 3px var(--color-brand-light); }
.modal-btns { display: flex; gap: 10px; margin-top: 18px; }
.modal-btns button { margin-top: 0; flex: 1; }
.btn-skip { background: var(--color-surface-2); color: var(--color-text-secondary); }
.btn-skip:hover { background: var(--color-border); }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <h1>🌮 XABOR</h1>
    <p>Panel de Comandas</p>
  </div>
  <label>Contraseña</label>
  <input type="password" id="password" placeholder="••••••••" autofocus />
  <div id="error"></div>
  <button id="btn-login" onclick="login()">Entrar</button>
</div>

<!-- Modal inicio de caja -->
<div class="modal-overlay" id="modal-fondo">
  <div class="modal-box">
    <h2>💵 Inicio de Caja</h2>
    <p>¿Con cuánto efectivo iniciamos hoy?</p>
    <input class="fondo-input" type="number" id="fondo-monto" placeholder="$0" min="0" step="10" />
    <div class="modal-btns">
      <button class="btn-skip" onclick="omitirFondo()">Omitir</button>
      <button onclick="guardarFondo()">Confirmar</button>
    </div>
  </div>
</div>

<script>
// Si ya hay sesión válida, ir directo al panel
const token = sessionStorage.getItem('xabor_token');
if (token) verificarYRedirigir(token);

async function verificarYRedirigir(t) {
  const resp = await fetch('/api/auth/verify', {
    headers: { 'Authorization': 'Bearer ' + t }
  }).catch(() => null);
  if (resp && resp.ok) location.href = '/';
}

let tokenActual = null;

async function login() {
  const pwd = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('error');
  if (!pwd) return;

  btn.disabled = true;
  btn.textContent = 'Verificando...';
  err.textContent = '';

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    const data = await resp.json();
    if (data.token) {
      tokenActual = data.token;
      sessionStorage.setItem('xabor_token', data.token);
      sessionStorage.setItem('xabor_role', data.role || 'staff');
      // Verificar si ya hay fondo registrado hoy
      const fondoResp = await fetch('/api/caja/fondo', {
        headers: { 'Authorization': 'Bearer ' + data.token }
      }).catch(() => null);
      const fondoData = fondoResp ? await fondoResp.json().catch(() => null) : null;
      if (fondoData && fondoData.fondo !== null) {
        // Ya tiene fondo — ir directo al panel
        location.href = '/';
      } else {
        // Mostrar modal de inicio de caja
        document.getElementById('modal-fondo').classList.add('visible');
        document.getElementById('fondo-monto').focus();
      }
    } else {
      err.textContent = '❌ Contraseña incorrecta';
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  } catch(e) {
    err.textContent = 'Error de conexión';
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

async function guardarFondo() {
  const monto = parseFloat(document.getElementById('fondo-monto').value);
  if (isNaN(monto) || monto < 0) {
    document.getElementById('fondo-monto').focus();
    return;
  }
  await fetch('/api/caja/fondo', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tokenActual },
    body: JSON.stringify({ monto })
  }).catch(() => null);
  location.href = '/';
}

function omitirFondo() {
  location.href = '/';
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
document.getElementById('fondo-monto')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') guardarFondo();
});
</script>
</body>
</html>
