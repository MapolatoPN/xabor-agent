<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xabor — Acceso</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.logo {
  text-align: center;
  margin-bottom: 28px;
}
.logo h1 {
  font-size: 2rem;
  letter-spacing: 2px;
  color: #e63946;
}
.logo p {
  color: #888;
  font-size: 0.85rem;
  margin-top: 4px;
}
label {
  display: block;
  font-size: 0.82rem;
  color: #aaa;
  margin-bottom: 6px;
}
input[type="password"] {
  width: 100%;
  background: #0f3460;
  border: 1px solid #1a4a8a;
  border-radius: 8px;
  color: #eee;
  padding: 12px 14px;
  font-size: 1rem;
  outline: none;
  transition: border-color .2s;
}
input[type="password"]:focus { border-color: #06d6a0; }
button {
  width: 100%;
  background: #e63946;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 13px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 18px;
  transition: background .2s;
}
button:hover { background: #c1121f; }
button:disabled { background: #555; cursor: default; }
#error {
  color: #ef476f;
  font-size: 0.83rem;
  text-align: center;
  margin-top: 12px;
  min-height: 18px;
}
/* Modal fondo de caja */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.modal-overlay.visible { display: flex; }
.modal-box {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 16px;
  padding: 36px 32px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  text-align: center;
}
.modal-box h2 { font-size: 1.2rem; margin-bottom: 8px; color: #06d6a0; }
.modal-box p  { font-size: 0.85rem; color: #aaa; margin-bottom: 20px; }
.fondo-input {
  width: 100%;
  background: #0f3460;
  border: 1px solid #1a4a8a;
  border-radius: 8px;
  color: #eee;
  padding: 14px;
  font-size: 1.4rem;
  font-weight: 700;
  text-align: center;
  outline: none;
}
.fondo-input:focus { border-color: #06d6a0; }
.modal-btns { display: flex; gap: 10px; margin-top: 18px; }
.modal-btns button { margin-top: 0; flex: 1; }
.btn-skip { background: #333; }
.btn-skip:hover { background: #444; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <h1>🌮 XABOR</h1>
    <p>Panel de Comandas</p>
  </div>
  <label>Contraseña</label>
  <input type="password" id="password" placeholder="••••••••" autofocus />
  <div id="error"></div>
  <button id="btn-login" onclick="login()">Entrar</button>
</div>

<!-- Modal inicio de caja -->
<div class="modal-overlay" id="modal-fondo">
  <div class="modal-box">
    <h2>💵 Inicio de Caja</h2>
    <p>¿Con cuánto efectivo iniciamos hoy?</p>
    <input class="fondo-input" type="number" id="fondo-monto" placeholder="$0" min="0" step="10" />
    <div class="modal-btns">
      <button class="btn-skip" onclick="omitirFondo()">Omitir</button>
      <button onclick="guardarFondo()">Confirmar</button>
    </div>
  </div>
</div>

<script>
// Si ya hay sesión válida, ir directo al panel
const token = sessionStorage.getItem('xabor_token');
if (token) verificarYRedirigir(token);

async function verificarYRedirigir(t) {
  const resp = await fetch('/api/auth/verify', {
    headers: { 'Authorization': 'Bearer ' + t }
  }).catch(() => null);
  if (resp && resp.ok) location.href = '/';
}

let tokenActual = null;

async function login() {
  const pwd = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('error');
  if (!pwd) return;

  btn.disabled = true;
  btn.textContent = 'Verificando...';
  err.textContent = '';

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    const data = await resp.json();
    if (data.token) {
      tokenActual = data.token;
      sessionStorage.setItem('xabor_token', data.token);
      sessionStorage.setItem('xabor_role', data.role || 'staff');
      // Verificar si ya hay fondo registrado hoy
      const fondoResp = await fetch('/api/caja/fondo', {
        headers: { 'Authorization': 'Bearer ' + data.token }
      }).catch(() => null);
      const fondoData = fondoResp ? await fondoResp.json().catch(() => null) : null;
      if (fondoData && fondoData.fondo !== null) {
        // Ya tiene fondo — ir directo al panel
        location.href = '/';
      } else {
        // Mostrar modal de inicio de caja
        document.getElementById('modal-fondo').classList.add('visible');
        document.getElementById('fondo-monto').focus();
      }
    } else {
      err.textContent = '❌ Contraseña incorrecta';
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  } catch(e) {
    err.textContent = 'Error de conexión';
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

async function guardarFondo() {
  const monto = parseFloat(document.getElementById('fondo-monto').value);
  if (isNaN(monto) || monto < 0) {
    document.getElementById('fondo-monto').focus();
    return;
  }
  await fetch('/api/caja/fondo', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tokenActual },
    body: JSON.stringify({ monto })
  }).catch(() => null);
  location.href = '/';
}

function omitirFondo() {
  location.href = '/';
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
document.getElementById('fondo-monto')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') guardarFondo();
});
</script>
</body>
</html>
