<style>

body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
header { background: #e63946; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

.comanda.en_preparacion { border-color: #ffd166; }

.comanda-footer { padding: 12px 16px; background: rgba(0,0,0,0.2); display: flex; gap: 8px; flex-wrap: wrap; }
button { border: none; border-radius: 8px; padding: 8px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }

<body>
<header>
  <h1>🌮 Xabor — Comandas</h1>
  <div id="estado-ws">
    <div id="dot"></div>
    <span id="label-ws">Conectando...</span>
  </div>
  <div id="contador">0 pedidos activos</div>
  <button onclick="pedidoPrueba()" style="background:rgba(255,255,255,0.2);color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.8rem">🧪 Pedido de prueba</button>
  <button onclick="abrirModalMensaje()" style="background:#06d6a0;color:#000;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.8rem;font-weight:700">💬 Enviar mensaje</button>
</header>

<!-- Modal: Enviar mensaje WhatsApp -->
<div id="modal-overlay">
  <div id="modal-msg">
    <h2>💬 Enviar mensaje por WhatsApp</h2>

    <label>Número del cliente (con código de país)</label>
    <input id="msg-telefono" type="text" placeholder="ej. 5218781119527" />

    <label>Mensaje</label>
    <textarea id="msg-texto" placeholder="Hola, aquí tu enlace de pago: https://clip.mx/p/..."></textarea>

    <div id="modal-aviso">⚠️ Solo funciona si el cliente escribió en las últimas 24 horas</div>
    <div id="msg-feedback"></div>

    <div id="modal-acciones">
      <button id="btn-cancelar-msg" onclick="cerrarModalMensaje()">Cancelar</button>
      <button id="btn-send-msg" onclick="enviarMensajeManual()">📤 Enviar</button>
    </div>
  </div>
</div>

<main>
  <div id="sin-pedidos">
    <span class="emoji">🍽️</span>
    Esperando pedidos...
  </div>
  <div id="grid-pedidos"></div>
</main>

<script>
const grid = document.getElementById('grid-pedidos');
const sinPedidos = document.getElementById('sin-pedidos');
const contador = document.getElementById('contador');
const dot = document.getElementById('dot');
const labelWs = document.getElementById('label-ws');
const pedidos = {};

const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
let ws;

function conectarWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { dot.className = 'conectado'; labelWs.textContent = 'Conectado'; };
  ws.onclose = () => { dot.className = 'desconectado'; labelWs.textContent = 'Desconectado — reconectando...'; setTimeout(conectarWS, 3000); };
  ws.onerror = () => { dot.className = 'desconectado'; };
  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.tipo === 'nuevo_pedido') agregarPedido(msg.pedido);
      if (msg.tipo === 'actualizar_estado') actualizarEstadoUI(msg.id, msg.estado);
    } catch (e) { console.error('Error WS:', e); }
  };
}

// Hora zona Piedras Negras (CST/CDT = America/Matamoros)
function horaCST(isoString) {
  return new Date(isoString).toLocaleString('es-MX', {
    timeZone: 'America/Matamoros',
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: true
  });
}

function sonarAlerta() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 150, 300].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + delay/1000);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay/1000 + 0.2);
      osc.start(ctx.currentTime + delay/1000);
      osc.stop(ctx.currentTime + delay/1000 + 0.2);
    });
  } catch(e) {}
}

// ── Extraer nombre del cliente de forma segura ──
function getNombre(p) {
  if (typeof p.cliente === 'string') return p.cliente;
  if (p.cliente && typeof p.cliente === 'object') return p.cliente.nombre || p.cliente.name || 'Sin nombre';
  if (p.nombre) return p.nombre;
  return 'Sin nombre';
}

function getTelefono(p) {
  if (p.cliente && typeof p.cliente === 'object') return p.cliente.telefono || p.cliente.phone || '—';
  if (p.telefono) return p.telefono;
  return '—';
}

function getFormaPago(p) {
  if (p.forma_pago) return p.forma_pago;
  if (p.cliente && typeof p.cliente === 'object' && p.cliente.forma_pago) return p.cliente.forma_pago;
  if (p.pago) return p.pago;
  return 'No especificada';
}

// ── Calcular precio de item de forma segura ──
function getPrecioItem(item) {
  const precio = item.precio_unitario || item.precio || item.price || 0;
  const cantidad = item.cantidad || item.qty || 1;
  return precio * cantidad;
}

function agregarPedido(pedido) {
  pedidos[pedido.id] = pedido;
  actualizarContador();
  sinPedidos.style.display = 'none';
  sonarAlerta();
  const card = document.createElement('div');
  card.className = 'comanda nuevo';
  card.id = `comanda-${pedido.id}`;
  card.innerHTML = renderComanda(pedido);
  grid.prepend(card);
  // Impresión automática
  setTimeout(() => imprimirComanda(pedido.id), 800);
}

function renderComanda(p) {
  const horaCompleta = horaCST(p.timestamp);
  const esEntrega = p.modalidad === 'entrega a domicilio';
  const badgeClass = esEntrega ? 'badge-entrega' : 'badge-recoger';
  const badgeLabel = esEntrega ? '🛵 Entrega a domicilio' : '🏪 Recoger en tienda';
  const nombre = getNombre(p);
  const telefono = getTelefono(p);
  const formaPago = getFormaPago(p);

  const itemsHTML = (p.items || []).map(item => {
    const precioTotal = getPrecioItem(item);
    const precioStr = precioTotal > 0 ? `$${precioTotal.toFixed(0)}` : '—';
    return `
      <div class="item-linea">
        <span class="item-cant">${item.cantidad || 1}x</span>
        <span class="item-nombre-wrap">
          ${item.nombre || item.name || 'Producto'}
          ${item.notas ? `<small style="color:#888">${item.notas}</small>` : ''}
        </span>
        <span class="item-precio">${precioStr}</span>
      </div>
    `;
  }).join('');

  const envioHTML = p.costo_envio > 0
    ? `<div class="item-linea"><span class="item-cant"></span><span class="item-nombre-wrap">Envío</span><span class="item-precio">$${p.costo_envio}</span></div>`
    : '';

  const direccionHTML = esEntrega && p.cliente && typeof p.cliente === 'object' && p.cliente.calle ? `
    <div class="ticket-direccion">
      📍 ${p.cliente.calle}<br>
      ${p.cliente.colonia ? `Col. ${p.cliente.colonia}` : ''}
      ${p.cliente.entre_calles ? `<br>Entre: ${p.cliente.entre_calles}` : ''}
    </div>` : '';

  return `
    <div class="comanda-header">
      <span class="ticket-empresa-nombre">XABOR</span>
      <span class="ticket-empresa-ciudad">Piedras Negras, Coahuila</span>
      <span class="comanda-id">PEDIDO: ${p.id}</span>
      <span class="comanda-canal">${iconCanal(p.canal)} ${p.canal}</span>
    </div>
    <div class="comanda-body">
      <span class="ticket-meta">Fecha: ${horaCompleta}</span>
      <div class="comanda-cliente">
        <div class="comanda-nombre">${nombre}</div>
        <span class="comanda-telefono">Tel: ${telefono}</span>
        <span class="comanda-pago">Pago: ${formaPago}</span>
        <span class="badge-modalidad ${badgeClass}">${badgeLabel}</span>
        ${direccionHTML}
      </div>
      <div class="comanda-items">
        <div class="ticket-items-header">
          <span class="col-cant">CANT</span>
          <span class="col-prod">PRODUCTO</span>
          <span class="col-precio">PRECIO</span>
        </div>
        ${itemsHTML}
        ${envioHTML}
      </div>
      <div class="comanda-total">
        <span>TOTAL</span>
        <span class="monto">$${p.total}</span>
      </div>
      <span class="ticket-footer-print">Gracias por su pedido!<br>WhatsApp: (878) 000-0000</span>
      <div class="comanda-hora">Recibido: ${horaCompleta}</div>
    </div>
    <div class="comanda-footer">
      <button class="btn-imprimir" onclick="imprimirComanda('${p.id}')">🖨️ Imprimir</button>
      <button class="btn-preparando" onclick="cambiarEstado('${p.id}', 'en_preparacion')">👨‍🍳 Preparando</button>
      <button class="btn-listo" onclick="cambiarEstado('${p.id}', 'listo')">✅ Listo</button>
      <button class="btn-entregado" onclick="marcarEntregado('${p.id}')">📦 Entregado</button>
    </div>
  `;
}

function iconCanal(canal) {
  if (canal === 'whatsapp') return '💬';
  if (canal === 'voz') return '📞';
  return '🧪';
}

function actualizarEstadoUI(id, estado) {
  const card = document.getElementById(`comanda-${id}`);
  if (card) { card.className = `comanda ${estado}`; if (pedidos[id]) pedidos[id].estado = estado; }
}

function actualizarContador() {
  const activos = Object.values(pedidos).filter(p => p.estado !== 'entregado').length;
  contador.textContent = `${activos} pedido${activos !== 1 ? 's' : ''} activo${activos !== 1 ? 's' : ''}`;
}

function cambiarEstado(id, nuevoEstado) {
  fetch(`/pedidos/${id}/estado`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ estado: nuevoEstado })
  }).then(() => actualizarEstadoUI(id, nuevoEstado));
}

function marcarEntregado(id) {
  if (!confirm('¿Marcar como entregado y cerrar este pedido?')) return;
  fetch(`/pedidos/${id}/estado`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ estado: 'entregado' })
  }).then(() => {
    const card = document.getElementById(`comanda-${id}`);
    if (card) card.remove();
    if (pedidos[id]) delete pedidos[id];
    actualizarContador();
    if (Object.keys(pedidos).length === 0) sinPedidos.style.display = '';
  });
}

function imprimirComanda(id) {
  document.querySelectorAll('.comanda').forEach(c => {
    c.style.display = c.id === `comanda-${id}` ? '' : 'none';
  });
  window.print();
  document.querySelectorAll('.comanda').forEach(c => c.style.display = '');
}

function pedidoPrueba() {
  fetch('/test/pedido', { method: 'POST' });
}
