<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Xabor — Panel de Comandas</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
header { background: #e63946; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 1px; }
#estado-ws { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
#dot { width: 10px; height: 10px; border-radius: 50%; background: #aaa; transition: background 0.3s; }
#dot.conectado { background: #06d6a0; }
#dot.desconectado { background: #ef476f; }
#contador { background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 20px; font-weight: 600; font-size: 0.9rem; }
main { padding: 24px; max-width: 1200px; margin: 0 auto; }
#sin-pedidos { text-align: center; margin-top: 80px; opacity: 0.4; font-size: 1.1rem; }
#sin-pedidos .emoji { font-size: 3rem; display: block; margin-bottom: 12px; }
#grid-pedidos { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
.comanda { background: #16213e; border: 2px solid #0f3460; border-radius: 12px; overflow: hidden; animation: slideIn 0.3s ease; transition: border-color 0.3s; }
.comanda.nuevo { border-color: #e63946; }
.comanda.en_preparacion { border-color: #ffd166; }
.comanda.listo { border-color: #06d6a0; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
.comanda-header { background: #0f3460; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
.comanda-id { font-weight: 700; font-size: 1rem; letter-spacing: 1px; }
.comanda-canal { font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 2px 10px; border-radius: 10px; }
.comanda-body { padding: 16px; }
.comanda-cliente { margin-bottom: 12px; font-size: 0.9rem; color: #aaa; }
.comanda-nombre { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: 0.3px; margin-bottom: 4px; }
.badge-modalidad { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; margin-top: 4px; }
.badge-recoger { background: #06d6a0; color: #000; }
.badge-entrega { background: #ffd166; color: #000; }
.comanda-items { margin: 12px 0; }
.item-linea { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.07); font-size: 0.9rem; }
.item-linea:last-child { border-bottom: none; }
.item-cant { color: #e63946; font-weight: 700; margin-right: 8px; }
.item-precio { color: #ffd166; }
.comanda-total { margin-top: 12px; padding-top: 10px; border-top: 2px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 700; }
.comanda-total .monto { color: #06d6a0; }
.comanda-footer { padding: 12px 16px; background: rgba(0,0,0,0.2); display: flex; gap: 8px; flex-wrap: wrap; }
button { border: none; border-radius: 8px; padding: 8px 14px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
button:hover { opacity: 0.85; }
.btn-imprimir { background: #fff; color: #000; }
.btn-preparando { background: #ffd166; color: #000; }
.btn-listo { background: #06d6a0; color: #000; }
.btn-entregado { background: #555; color: #fff; }
.comanda-hora { font-size: 0.75rem; color: #666; margin-top: 8px; }

/* ─── Impresión térmica 80mm ─────────────────────────────────────────── */
@media print {
  @page { size: 80mm auto; margin: 2mm 2mm; }
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    background: #fff;
    color: #000;
    width: 80mm;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    font-weight: bold;
    line-height: 1.6;
  }
  header, .comanda-footer, #sin-pedidos, .comanda-hora { display: none !important; }
  #grid-pedidos { display: block; }
  .comanda { border: none !important; background: #fff !important; color: #000 !important; width: 76mm; page-break-inside: avoid; break-inside: avoid; margin: 0; }

  /* ── Encabezado negro ── */
  .comanda-header {
    background: #000 !important;
    color: #fff !important;
    padding: 8px 6px 6px;
    text-align: center;
    display: block !important;
  }
  .ticket-empresa-nombre {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 3px;
    display: block;
    text-align: center;
    color: #fff !important;
  }
  .ticket-empresa-ciudad {
    font-size: 11px;
    font-weight: bold;
    display: block;
    text-align: center;
    color: #fff !important;
    margin-bottom: 4px;
  }
  .comanda-id {
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 1px;
    display: block;
    text-align: center;
    color: #fff !important;
  }
  .comanda-canal { display: none !important; }

  /* ── Cuerpo ── */
  .comanda-body { padding: 4px 2px; }

  /* ── Pedido y fecha ── */
  .ticket-meta {
    font-size: 12px;
    font-weight: bold;
    color: #000 !important;
    margin-bottom: 4px;
    display: block;
  }

  /* ── Cliente ── */
  .comanda-cliente { font-size: 12px; font-weight: bold; color: #000 !important; margin-bottom: 4px; }
  .comanda-nombre { font-size: 13px !important; font-weight: 900 !important; color: #000 !important; text-transform: uppercase; margin-bottom: 2px; }
  .comanda-telefono { display: block; color: #000 !important; font-weight: bold; }
  .comanda-pago { display: block; color: #000 !important; font-weight: 900; }
  .badge-modalidad { font-size: 12px; font-weight: 900; background: none !important; color: #000 !important; padding: 0; text-transform: uppercase; display: block; margin-top: 2px; }

  /* ── Dirección ── */
  .ticket-direccion {
    border-left: 3px solid #000 !important;
    padding: 2px 5px;
    font-size: 12px;
    font-weight: bold;
    color: #000 !important;
    margin: 3px 0;
    background: none !important;
    display: block;
  }

  /* ── Tabla de items ── */
  .comanda-items { margin: 4px 0; }
  .ticket-items-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 900;
    border-top: 2px solid #000;
    border-bottom: 2px solid #000;
    padding: 3px 0;
    color: #000 !important;
  }
  .ticket-items-header .col-cant { width: 32px; }
  .ticket-items-header .col-prod { flex: 1; }
  .ticket-items-header .col-precio { width: 48px; text-align: right; }

  .item-linea { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: none; font-size: 12px; font-weight: bold; color: #000 !important; align-items: flex-start; }
  .item-cant { color: #000 !important; font-weight: 900; width: 32px; flex-shrink: 0; }
  .item-nombre-wrap { flex: 1; font-weight: bold; }
  .item-precio { color: #000 !important; font-weight: 900; width: 48px; text-align: right; flex-shrink: 0; }
  .item-linea small { font-size: 11px; font-weight: bold; color: #000 !important; display: block; padding-left: 2px; }

  /* ── Total ── */
  .comanda-total {
    font-size: 15px !important;
    font-weight: 900 !important;
    border-top: 3px solid #000 !important;
    border-bottom: 3px solid #000 !important;
    margin-top: 4px;
    padding: 4px 0;
    color: #000 !important;
  }
  .comanda-total .monto { color: #000 !important; font-weight: 900 !important; }

  /* ── Pie ── */
  .ticket-footer-print {
    text-align: center;
    font-size: 11px;
    font-weight: bold;
    color: #000 !important;
    margin-top: 6px;
    border-top: 1px dashed #000;
    padding-top: 4px;
    display: block;
  }
}

    /* ─── Modal Enviar Mensaje ──────────────────────────────────────────── */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    #modal-overlay.visible { display: flex; }
    #modal-msg {
      background: #16213e; border: 2px solid #0f3460;
      border-radius: 14px; padding: 24px;
      width: 100%; max-width: 420px; margin: 16px;
    }
    #modal-msg h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
    #modal-msg label { display: block; font-size: 0.78rem; color: #aaa; margin-bottom: 4px; margin-top: 12px; }
    #modal-msg input, #modal-msg textarea {
      width: 100%; background: #0f3460; border: 1px solid #1a4a8a;
      border-radius: 8px; color: #eee; padding: 9px 12px;
      font-size: 0.9rem; font-family: inherit; resize: vertical;
    }
    #modal-msg textarea { min-height: 80px; }
    #modal-aviso {
      font-size: 0.75rem; color: #ffd166;
      background: rgba(255,209,102,0.1); border-left: 3px solid #ffd166;
      padding: 6px 10px; border-radius: 4px; margin-top: 12px;
    }
    #modal-acciones { display: flex; gap: 10px; margin-top: 16px; }
    #btn-send-msg { flex: 1; background: #06d6a0; color: #000; font-size: 0.9rem; padding: 10px; }
    #btn-cancelar-msg { background: rgba(255,255,255,0.1); color: #eee; padding: 10px 16px; }
    #msg-feedback { margin-top: 10px; font-size: 0.82rem; text-align: center; min-height: 18px; }

  </style>
</head>
<body>
<header>
  <h1>🌮 Xabor — Comandas</h1>
  <div id="estado-ws">
    <div id="dot"></div>
    <span id="label-ws">Conectando...</span>
  </div>
  <div id="contador">0 pedidos activos</div>
  <button onclick="pedidoPrueba()" style="background:rgba(255,255,255,0.2);color:#fff;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.8rem">🧪 Pedido de prueba</button>
  <button onclick="abrirModalMensaje()" style="background:#06d6a0;color:#000;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.8rem;font-weight:700">💬 Enviar mensaje</button>
</header>

<!-- Modal WhatsApp -->
<div id="modal-overlay">
  <div id="modal-msg">
    <h2>💬 Enviar mensaje por WhatsApp</h2>
    <label>Número del cliente (con código de país)</label>
    <input id="msg-telefono" type="text" placeholder="ej. 5218781119527" />
    <label>Mensaje</label>
    <textarea id="msg-texto" placeholder="Hola, aquí tu enlace de pago: https://clip.mx/p/..."></textarea>
    <div id="modal-aviso">⚠️ Solo funciona si el cliente escribió en las últimas 24 horas</div>
    <div id="msg-feedback"></div>
    <div id="modal-acciones">
      <button id="btn-cancelar-msg" onclick="cerrarModalMensaje()">Cancelar</button>
      <button id="btn-send-msg" onclick="enviarMensajeManual()">📤 Enviar</button>
    </div>
  </div>
</div>

<div id="tabs-nav" style="background:#0f3460;display:flex;gap:4px;padding:10px 24px 0;">
  <button onclick="mostrarTab('comandas')" id="tab-comandas" style="background:#1a1a2e;color:#fff;border:none;padding:10px 20px;border-radius:8px 8px 0 0;cursor:pointer;font-weight:700;font-size:0.9rem;">🍽️ Comandas</button>
  <button onclick="mostrarTab('chats')" id="tab-chats" style="background:#0f3460;color:#aaa;border:none;padding:10px 20px;border-radius:8px 8px 0 0;cursor:pointer;font-weight:700;font-size:0.9rem;">💬 Chats <span id="badge-chats" style="background:#e63946;color:#fff;border-radius:10px;padding:1px 7px;font-size:0.75rem;display:none">0</span></button>
</div>

<main>
  <!-- Tab Comandas -->
  <div id="vista-comandas">
    <div id="sin-pedidos">
      <span class="emoji">🍽️</span>
      Esperando pedidos...
    </div>
    <div id="grid-pedidos"></div>
  </div>

  <!-- Tab Chats -->
  <div id="vista-chats" style="display:none;max-width:900px;margin:0 auto;">
    <div style="display:flex;gap:16px;height:calc(100vh - 140px);">
      <!-- Lista de contactos -->
      <div id="lista-chats" style="width:280px;flex-shrink:0;background:#16213e;border-radius:12px;overflow-y:auto;border:1px solid #0f3460;">
        <div style="padding:12px 16px;border-bottom:1px solid #0f3460;font-size:0.85rem;color:#aaa;">Conversaciones recientes</div>
        <div id="contactos-lista"></div>
      </div>
      <!-- Conversación activa -->
      <div style="flex:1;display:flex;flex-direction:column;background:#16213e;border-radius:12px;border:1px solid #0f3460;overflow:hidden;">
        <div id="chat-header" style="padding:12px 16px;border-bottom:1px solid #0f3460;font-weight:700;">Selecciona una conversación</div>
        <div id="chat-mensajes" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;"></div>
        <div id="chat-footer" style="padding:12px 16px;border-top:1px solid #0f3460;display:flex;gap:8px;">
          <textarea id="chat-input" placeholder="Escribe un mensaje..." rows="2" style="flex:1;background:#0f3460;border:1px solid #1a4a8a;border-radius:8px;color:#eee;padding:8px;font-size:0.9rem;font-family:inherit;resize:none;"></textarea>
          <button onclick="enviarDesdeChat()" style="background:#06d6a0;color:#000;font-weight:700;padding:8px 16px;border-radius:8px;align-self:flex-end;">Enviar</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const grid = document.getElementById('grid-pedidos');
const sinPedidos = document.getElementById('sin-pedidos');
const contador = document.getElementById('contador');
const dot = document.getElementById('dot');
const labelWs = document.getElementById('label-ws');
const pedidos = {};

const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
let ws;

function conectarWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { dot.className = 'conectado'; labelWs.textContent = 'Conectado'; };
  ws.onclose = () => { dot.className = 'desconectado'; labelWs.textContent = 'Desconectado — reconectando...'; setTimeout(conectarWS, 3000); };
  ws.onerror = () => { dot.className = 'desconectado'; };
  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.tipo === 'nuevo_pedido') agregarPedido(msg.pedido);
      if (msg.tipo === 'actualizar_estado') actualizarEstadoUI(msg.id, msg.estado);
      if (msg.tipo === 'nuevo_mensaje') recibirMensajeWS(msg.mensaje);
    } catch (e) { console.error('Error WS:', e); }
  };
}

// Hora zona Piedras Negras (CST/CDT = America/Matamoros)
function horaCST(isoString) {
  return new Date(isoString).toLocaleString('es-MX', {
    timeZone: 'America/Matamoros',
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit', hour12: true
  });
}

function sonarAlerta() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 150, 300].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + delay/1000);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay/1000 + 0.2);
      osc.start(ctx.currentTime + delay/1000);
      osc.stop(ctx.currentTime + delay/1000 + 0.2);
    });
  } catch(e) {}
}

// ── Extraer nombre del cliente de forma segura ──
function getNombre(p) {
  if (typeof p.cliente === 'string') return p.cliente;
  if (p.cliente && typeof p.cliente === 'object') return p.cliente.nombre || p.cliente.name || 'Sin nombre';
  if (p.nombre) return p.nombre;
  return 'Sin nombre';
}

function getTelefono(p) {
  if (p.cliente && typeof p.cliente === 'object') return p.cliente.telefono || p.cliente.phone || '—';
  if (p.telefono) return p.telefono;
  return '—';
}

function getFormaPago(p) {
  if (p.forma_pago) return p.forma_pago;
  if (p.cliente && typeof p.cliente === 'object' && p.cliente.forma_pago) return p.cliente.forma_pago;
  if (p.pago) return p.pago;
  return 'No especificada';
}

// ── Calcular precio de item de forma segura ──
function getPrecioItem(item) {
  const precio = item.precio_unitario || item.precio || item.price || 0;
  const cantidad = item.cantidad || item.qty || 1;
  return precio * cantidad;
}

function agregarPedido(pedido) {
  pedidos[pedido.id] = pedido;
  actualizarContador();
  sinPedidos.style.display = 'none';
  sonarAlerta();
  const card = document.createElement('div');
  card.className = 'comanda nuevo';
  card.id = `comanda-${pedido.id}`;
  card.innerHTML = renderComanda(pedido);
  grid.prepend(card);
  // Impresión automática
  setTimeout(() => imprimirComanda(pedido.id), 800);
}

function renderComanda(p) {
  const horaCompleta = horaCST(p.timestamp);
  const esEntrega = p.modalidad === 'entrega a domicilio';
  const badgeClass = esEntrega ? 'badge-entrega' : 'badge-recoger';
  const badgeLabel = esEntrega ? '🛵 Entrega a domicilio' : '🏪 Recoger en tienda';
  const nombre = getNombre(p);
  const telefono = getTelefono(p);
  const formaPago = getFormaPago(p);

  const itemsHTML = (p.items || []).map(item => {
    const precioTotal = getPrecioItem(item);
    const precioStr = precioTotal > 0 ? `$${precioTotal.toFixed(0)}` : '—';
    return `
      <div class="item-linea">
        <span class="item-cant">${item.cantidad || 1}x</span>
        <span class="item-nombre-wrap">
          ${item.nombre || item.name || 'Producto'}
          ${item.notas ? `<small style="color:#888">${item.notas}</small>` : ''}
        </span>
        <span class="item-precio">${precioStr}</span>
      </div>
    `;
  }).join('');

  const envioHTML = p.costo_envio > 0
    ? `<div class="item-linea"><span class="item-cant"></span><span class="item-nombre-wrap">Envío</span><span class="item-precio">$${p.costo_envio}</span></div>`
    : '';

  const direccionHTML = esEntrega && p.cliente && typeof p.cliente === 'object' && p.cliente.calle ? `
    <div class="ticket-direccion">
      📍 ${p.cliente.calle}<br>
      ${p.cliente.colonia ? `Col. ${p.cliente.colonia}` : ''}
      ${p.cliente.entre_calles ? `<br>Entre: ${p.cliente.entre_calles}` : ''}
    </div>` : '';

  return `
    <div class="comanda-header">
      <span class="ticket-empresa-nombre">XABOR</span>
      <span class="ticket-empresa-ciudad">Piedras Negras, Coahuila</span>
      <span class="comanda-id">PEDIDO: ${p.id}</span>
      <span class="comanda-canal">${iconCanal(p.canal)} ${p.canal}</span>
    </div>
    <div class="comanda-body">
      <span class="ticket-meta">Fecha: ${horaCompleta}</span>
      <div class="comanda-cliente">
        <div class="comanda-nombre">${nombre}</div>
        <span class="comanda-telefono">Tel: ${telefono}</span>
        <span class="comanda-pago">Pago: ${formaPago}</span>
        <span class="badge-modalidad ${badgeClass}">${badgeLabel}</span>
        ${direccionHTML}
      </div>
      <div class="comanda-items">
        <div class="ticket-items-header">
          <span class="col-cant">CANT</span>
          <span class="col-prod">PRODUCTO</span>
          <span class="col-precio">PRECIO</span>
        </div>
        ${itemsHTML}
        ${envioHTML}
      </div>
      <div class="comanda-total">
        <span>TOTAL</span>
        <span class="monto">$${p.total}</span>
      </div>
      <span class="ticket-footer-print">Gracias por su pedido!<br>WhatsApp: (878) 000-0000</span>
      <div class="comanda-hora">Recibido: ${horaCompleta}</div>
    </div>
    <div class="comanda-footer">
      <button class="btn-imprimir" onclick="imprimirComanda('${p.id}')">🖨️ Imprimir</button>
      <button class="btn-preparando" onclick="cambiarEstado('${p.id}', 'en_preparacion')">👨‍🍳 Preparando</button>
      <button class="btn-listo" onclick="cambiarEstado('${p.id}', 'listo')">✅ Listo</button>
      <button class="btn-entregado" onclick="marcarEntregado('${p.id}')">📦 Entregado</button>
    </div>
  `;
}

function iconCanal(canal) {
  if (canal === 'whatsapp') return '💬';
  if (canal === 'voz') return '📞';
  return '🧪';
}

function actualizarEstadoUI(id, estado) {
  const card = document.getElementById(`comanda-${id}`);
  if (card) { card.className = `comanda ${estado}`; if (pedidos[id]) pedidos[id].estado = estado; }
}

function actualizarContador() {
  const activos = Object.values(pedidos).filter(p => p.estado !== 'entregado').length;
  contador.textContent = `${activos} pedido${activos !== 1 ? 's' : ''} activo${activos !== 1 ? 's' : ''}`;
}

function cambiarEstado(id, nuevoEstado) {
  fetch(`/pedidos/${id}/estado`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ estado: nuevoEstado })
  }).then(() => actualizarEstadoUI(id, nuevoEstado));
}

function marcarEntregado(id) {
  if (!confirm('¿Marcar como entregado y cerrar este pedido?')) return;
  fetch(`/pedidos/${id}/estado`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ estado: 'entregado' })
  }).then(() => {
    const card = document.getElementById(`comanda-${id}`);
    if (card) card.remove();
    if (pedidos[id]) delete pedidos[id];
    actualizarContador();
    if (Object.keys(pedidos).length === 0) sinPedidos.style.display = '';
  });
}

function imprimirComanda(id) {
  document.querySelectorAll('.comanda').forEach(c => {
    c.style.display = c.id === `comanda-${id}` ? '' : 'none';
  });
  window.print();
  document.querySelectorAll('.comanda').forEach(c => c.style.display = '');
}

  fetch('/test/pedido', { method: 'POST' });
}

// ─── Modal: Enviar mensaje WhatsApp ──────────────────────────────────────
function abrirModalMensaje() {
  const lista = Object.values(pedidos).filter(p => p.cliente?.telefono);
  if (lista.length > 0) document.getElementById('msg-telefono').value = lista[0].cliente.telefono;
  document.getElementById('msg-feedback').textContent = '';
  document.getElementById('modal-overlay').classList.add('visible');
  document.getElementById('msg-texto').focus();
}
function cerrarModalMensaje() {
  document.getElementById('modal-overlay').classList.remove('visible');
  document.getElementById('msg-texto').value = '';
  document.getElementById('msg-telefono').value = '';
  document.getElementById('msg-feedback').textContent = '';
}
async function enviarMensajeManual() {
  const telefono = document.getElementById('msg-telefono').value.trim().replace(/\D/g, '');
  const mensaje  = document.getElementById('msg-texto').value.trim();
  const feedback = document.getElementById('msg-feedback');
  const btn      = document.getElementById('btn-send-msg');
  if (!telefono || !mensaje) { feedback.style.color='#ef476f'; feedback.textContent='Escribe el número y el mensaje.'; return; }
  btn.textContent = 'Enviando...'; btn.disabled = true;
  try {
    const resp = await fetch('/api/send-message', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telefono, mensaje })
    });
    const data = await resp.json();
    if (data.ok) { feedback.style.color='#06d6a0'; feedback.textContent='✅ Mensaje enviado'; setTimeout(cerrarModalMensaje, 1500); }
    else { feedback.style.color='#ef476f'; feedback.textContent=`Error: ${data.error}`; }
  } catch(e) { feedback.style.color='#ef476f'; feedback.textContent='Error de conexión.'; }
  btn.textContent = '📤 Enviar'; btn.disabled = false;
}
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) cerrarModalMensaje();
});

// ─── Tabs ───────────────────────────────────────────────────────────────────
function mostrarTab(tab) {
  const esChats = tab === 'chats';
  document.getElementById('vista-comandas').style.display = esChats ? 'none' : '';
  document.getElementById('vista-chats').style.display = esChats ? '' : 'none';
  document.getElementById('tab-comandas').style.background = esChats ? '#0f3460' : '#1a1a2e';
  document.getElementById('tab-comandas').style.color = esChats ? '#aaa' : '#fff';
  document.getElementById('tab-chats').style.background = esChats ? '#1a1a2e' : '#0f3460';
  document.getElementById('tab-chats').style.color = esChats ? '#fff' : '#aaa';
  if (esChats) {
    document.getElementById('badge-chats').style.display = 'none';
    document.getElementById('badge-chats').textContent = '0';
    chatNuevos = 0;
    cargarConversaciones();
  }
}

// ─── Chats WhatsApp ──────────────────────────────────────────────────────────
let chatAbierto = null;
let chatNuevos = 0;

async function cargarConversaciones() {
  const lista = await fetch('/api/conversaciones').then(r => r.json()).catch(() => []);
  const cont = document.getElementById('contactos-lista');
  if (!lista.length) { cont.innerHTML = '<div style="padding:16px;color:#666;font-size:0.85rem;">Sin conversaciones aún</div>'; return; }
  cont.innerHTML = lista.map(c => `
    <div onclick="abrirConversacion('${c.telefono}','${(c.nombre||'').replace(/'/g,"\\'")}') "
         id="contacto-${c.telefono}"
         style="padding:12px 16px;cursor:pointer;border-bottom:1px solid #0f3460;transition:background .15s;"
         onmouseover="this.style.background='#0f3460'" onmouseout="this.style.background=chatAbierto==='${c.telefono}'?'#1a4a8a':''">
      <div style="font-weight:600;font-size:0.9rem;">${c.nombre || ('📞 ' + c.telefono)}</div>
      <div style="font-size:0.78rem;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.texto||''}</div>
      <div style="font-size:0.72rem;color:#555;margin-top:2px;">${horaCST(c.timestamp)}</div>
    </div>
  `).join('');
}

async function abrirConversacion(telefono, nombre) {
  chatAbierto = telefono;
  document.getElementById('chat-header').textContent = `💬 ${nombre || telefono}`;
  // Marcar activo
  document.querySelectorAll('#contactos-lista > div').forEach(d => d.style.background = '');
  const el = document.getElementById(`contacto-${telefono}`);
  if (el) el.style.background = '#1a4a8a';
  // Cargar mensajes
  const msgs = await fetch(`/api/conversacion/${telefono}`).then(r => r.json()).catch(() => []);
  renderMensajes(msgs);
  // Poner teléfono en el input de envío
  document.getElementById('chat-input').dataset.telefono = telefono;
  document.getElementById('chat-input').dataset.nombre = nombre || '';
}

function renderMensajes(msgs) {
  const cont = document.getElementById('chat-mensajes');
  cont.innerHTML = msgs.map(m => {
    const saliente = m.direccion === 'saliente';
    return `
      <div style="display:flex;justify-content:${saliente ? 'flex-end' : 'flex-start'};">
        <div style="max-width:75%;padding:8px 12px;border-radius:${saliente ? '12px 12px 0 12px' : '12px 12px 12px 0'};
                    background:${saliente ? '#06d6a0' : '#0f3460'};color:${saliente ? '#000' : '#eee'};font-size:0.88rem;word-break:break-word;">
          ${m.texto}
          <div style="font-size:0.7rem;opacity:0.6;margin-top:4px;text-align:right;">${horaCST(m.timestamp)}</div>
        </div>
      </div>
    `;
  }).join('');
  cont.scrollTop = cont.scrollHeight;
}

function recibirMensajeWS(msg) {
  // Actualizar badge si no estamos en la pestaña chats
  const enChats = document.getElementById('vista-chats').style.display !== 'none';
  if (!enChats) {
    chatNuevos++;
    const badge = document.getElementById('badge-chats');
    badge.textContent = chatNuevos;
    badge.style.display = '';
  }
  // Si la conversación abierta es del mismo teléfono, agregar el mensaje
  if (chatAbierto && msg.telefono === chatAbierto) {
    const cont = document.getElementById('chat-mensajes');
    const saliente = msg.direccion === 'saliente';
    const div = document.createElement('div');
    div.style.cssText = `display:flex;justify-content:${saliente ? 'flex-end' : 'flex-start'}`;
    div.innerHTML = `
      <div style="max-width:75%;padding:8px 12px;border-radius:${saliente ? '12px 12px 0 12px' : '12px 12px 12px 0'};
                  background:${saliente ? '#06d6a0' : '#0f3460'};color:${saliente ? '#000' : '#eee'};font-size:0.88rem;word-break:break-word;">
        ${msg.texto}
        <div style="font-size:0.7rem;opacity:0.6;margin-top:4px;text-align:right;">${horaCST(msg.timestamp)}</div>
      </div>`;
    cont.appendChild(div);
    cont.scrollTop = cont.scrollHeight;
  }
  // Recargar lista de contactos si estamos en chats
  if (enChats) cargarConversaciones();
}

async function enviarDesdeChat() {
  const input = document.getElementById('chat-input');
  const telefono = input.dataset.telefono;
  const texto = input.value.trim();
  if (!telefono || !texto) return;
  input.value = '';
  input.disabled = true;
  try {
    const resp = await fetch('/api/send-message', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telefono, mensaje: texto })
    });
    const data = await resp.json();
    if (!data.ok) alert('Error al enviar: ' + (data.error || 'desconocido'));
  } catch(e) { alert('Error de conexión.'); }
  input.disabled = false;
  input.focus();
}

// Enviar con Ctrl+Enter en el textarea de chat
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); enviarDesdeChat(); }
});
